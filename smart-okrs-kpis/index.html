        /* Hide elements marked x-cloak until Alpine.js initializes and strips
        the attribute — prevents a flash of un-evaluated x-show / x-if content. */
        [x-cloak] {
            display: none !important; 
        }

        /* The suggestable div, which contains a button and input text field. */
        div.suggestable { 
            /* Establish the containing block for the absolutely-positioned dropdown. */
            position: relative; 
            /* Lay out the button and input side-by-side, and size the wrapper to its contents. */
            display: inline-flex; 
            /* Some vertical spacing between suggestables and other content. */
            margin: 0.3em 0;
        }

        div.suggestable input[type=text] {
            font-size: 1em;
            width: 50em;
            padding-left: 0.5em;
        }

        div.suggestable button { 
            /* Stable font size */
            font-size: 1em;
            /* Turn the cursor into a pointer when hovering over the button to signal interactivity. */
            cursor: pointer; 
        }

        /* The suggestable dropdown; when the user taps the button, then this dropdown appears/disappears. */
        .suggestable_dropdown { 
            /* Stable font size */
            font-size: 1em;

            /* position: absolute + top:100% drops it directly below the wrapper's content. */
            position: absolute;
            top: 100%; 

            /* Stretch to the wrapper's full width. */
            left: 0; 
            right: 0; 

            /* Cap the list and scroll if longer. */
            max-height: 10em; 
            overflow: auto; 

            /* Keep this above sibling content. */
            z-index: 10; 

            /* Make it look like a dropdown. Opaque background so it covers
               underlying fields instead of letting them show through. */
            background: #fff;
            border: 1px solid #ccc;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .suggestable_dropdown li { 
            /* Make each row a comfortable click target. */
            padding: 6px 8px; 
            /* Signal interactivity because <li> isn't clickable by default semantics. */
            cursor: pointer; 
        }

        /* Hover highlight so users see which row they're about to pick. */
        .suggestable_dropdown li:hover { 
            background: #eef; 
        }

    </style>

            <p>
                <h3>Specific</h3>
                <textarea id="specific" cols="80" rows="5">
Target one area clearly, precisely, and explicitly.
Scope: What is in scope versus out of scope?
Functionality: What are the inputs, people, processes, and outputs?
Results: What are any objectives, outcomes, impacts?
                </textarea>
            </p>

            <p>
                <h3>Measurable</h3>
                <textarea id="measurable" cols="80" rows="5">
Quantify progress toward success by using metrics.
What metrics are being used, and how do they help?
What are any leading indicators and lagging indicators?
How do various stakeholders access the metrics?                    
                </textarea>
            </p>
            
             <p>
                <h3>Actionable</h3>
                <textarea id="actionable" cols="80" rows="5">
Achievable and able to start, sustain, and complete.
Who is working on this? List any roles, responsibilities, participants, etc.
What resources are needed? List any inputs, materials, budgets, approvals, etc.
How are the challenges? List any risks, assumptions, issues, dependencies, etc.                    
                </textarea>
            </p>

            <p>
                <h3>Relatable</h3>

Causally and logically connected; relevant.
Can you summarize the purpose, rationale, etc.?
Can you summarize the context, connections, etc.?
How does this interconnect with other work, outcomes, impacts?
                </textarea>
            </p>    

            <p>
                <h3>Timely</h3>
                <textarea id="timely" cols="80" rows="5">
Occurring at a time that is favorable, reservable, and bounded.
When does this start and finish, and why?
Where can participants see a timeline, or calendar, or schedule, etc.?
Is there anything important that happens before this or after this?                    
                </textarea>
            </p>

        <h2>Key Performance Indicator (KPI)</h2>

        <div class="kpi-title-div">
            <label for="kpi-title">KPI Title: use an exact name to avoid ambiguity</label>
            <br>
            <input type="text" id="kpi-title" size="80" placeholder="Title">

        <div class="kpi-url-div">

        <div class="kpi-contact-name-div">

        <div class="kpi-contact-email-div">

        </div>

        <p>
            <textarea id="kpi-content" cols="80" rows="8">
Scope: state areas of business and/or parts of the organization that are in/out.
Formula: the exact calculation of the indicator
Units: what is/are the unit(s) of measurement in use
Frequency: when is the indicator recorded and reported
Data source: the exact data sources involved in calculating a indicator value
Comments: any outstanding issues regarding the indicator
            </textarea>
        </p>

        <p>
            <button type="button" id="generate-button" onclick="window.generate()">Generate Markdown</button>
            <button type="button" id="download-button" onclick="window.download()">Download Markdown</button>
        </p>

        <p>
            <textarea id="markdown" cols="80" rows="50" readonly></textarea>
        </p>

        <script>
        let suggest_verbs = [

        ];

            "by date x",
            "during date range x to y",

            "by end of event x",
            "during event x",
            "between event x and y",
            "by start of commercial/fiscal week/quarter/year x",

            "Measure by Customer Satisfaction Score (1 to 5)",
            "Measure by Net Promoter Score (-100 to 100)",

            "Measure by Gross Profit Margin",
            "Measure by Net Profit Margin",
            "Measure by EBITDA",

            "Measure by Cash Conversion Cycle (CCC)",

            "Measure by progress 0-1",
            "Measure by queue count",
            "Measure by queue throughput ratio x items per y time",
            "Measure by queue success ratio x / y total",
            "Measure by queue failure ratio x / y total",
            "Measure by time to change",
            "Measure by time to resolve",
        ];
        let suggest_update_when = [
            "Update continuously in real-time",
            "Update daily/weekly/quarterly/yearly at day/time x",
            "Update at the end of commercial/fiscal week/quarter/year x",
            "Update on demand when we check in with stakeholders",
            "Update as work is delivered into production",
        ];
        let suggest_update_how = [
            "Update via Customer Relationship Manager (CRM) system",
            "Update via Enterprise Resource Planning (ERP) system",
            "Update via Enterprise Project Portfolio Management (EPPM) system", 
            "Update via Learning Management System (LMS)", 
            "Update via Information Technology Infrastructure Library (ITIL) tracking",
            "Update via Project Management Body Of Knowledge (PMBOK) practice",
            "Update via Software Engineering Body Of Knowledge (SWEBOK) practice",
            "Update via Service Level Agreements (SLA) monitoring",
            "Update via System Quality Attributes (SQA) telemetry",
            "Update via Risk Register System (RRS) auditing",
            "Update via staff self-report as needed",
        ];

        /**
         * Factory for the "suggestable" Alpine.js component.
         *
         * Returns the reactive state object Alpine binds via `x-data`. Each
         * suggestable on the page gets its own independent instance — they
         * share suggestion lists but never share open/closed state or values.
         *
         * State shape:
         *   open        boolean — whether the dropdown is currently visible.
         *   value       string  — the current text in the input. Starts empty
         *                         so the HTML `placeholder` attribute shows;
         *                         updated by typing (x-model) or by clicking
         *                         a suggestion in the dropdown.
         *   suggestions string[] — the full curated list passed in at
         *                         construction; not iterated directly by the
         *                         template, only used as the source for
         *                         `filtered`.
         *   filtered    string[] — getter that returns the autosuggest view:
         *                         case-insensitive substring matches against
         *                         the current `value`. When `value` is empty
         *                         or whitespace, returns the full list. This
         *                         is what the dropdown's x-for iterates, so
         *                         typing narrows the visible options live.
         *
         * @param {string[]} suggestions Curated list of suggestion strings.
         * @returns {{open: boolean, value: string, suggestions: string[], filtered: string[]}}
         */
        function suggester(suggestions) {
            return {
                open: false,
                value: "",
                suggestions: suggestions,
                get filtered() {
                    const q = this.value.trim().toLowerCase();
                    if (!q) return this.suggestions;
                    return this.suggestions.filter(s => s.toLowerCase().includes(q));
                }
            };
        }

        /**
         * Read a form field's current value by DOM id.
         *
         * Centralizes two concerns the markdown generators would otherwise
         * repeat: (1) tolerating a missing element (returns "" instead of
         * throwing on a typo or future refactor), and (2) trimming surrounding
         * whitespace so that the textareas' indented HTML scaffolding does
         * not leak leading/trailing blank lines into the generated Markdown.
         *
         * @param {string} id The element's `id` attribute.
         * @returns {string} The trimmed value, or "" if the element is absent.
         */
        function field(id) {
            const el = document.getElementById(id);
            return el ? el.value.trim() : "";
        }

        /**
         * Build the full Markdown document by concatenating the three
         * top-level sections in their canonical order: OKR, then SMART,
         * then KPI. This order matches the on-page form and is part of the
         * specification at the top of the file.
         *
         * @returns {string} The complete Markdown document.
         */
        function generate_markdown() {
            return generate_markdown_okr() + generate_markdown_smart() + generate_markdown_kpi();
        }

        /**
         * Build the "Objective & Key Result" section.
         *
         * Composes two sentences from seven single-line inputs:
         *   1. Objective:  "<verb> <topic> <delta> <timing>."
         *   2. Key Result: "<metric> <update> <source>."
         *
         * Each sentence ends with a period and is separated by a blank line
         * so it renders as its own paragraph in Markdown.
         *
         * @returns {string} The "## Objective & Key Result" section, ending
         *                   with a trailing blank line.
         */
        function generate_markdown_okr() {
            return "## Objective & Key Result\n\n" +
                field('verb') + " " +
                field('topic') + " " +
                field('delta') + " " +
                field('timing') + ".\n\n" +
                "- " + field('metric') + ".\n" +
                "- " + field('update') + ".\n" +
                "- " + field('source') + ".\n\n";
        }

        /**
         * Build the "SMART criteria" section.
         *
         * Emits an H2 heading and five H3 subsections (one per SMART letter)
         * in fixed order: Specific, Measurable, Actionable, Relatable, Timely.
         * Each subsection contains the user's textarea contents verbatim
         * (after trimming via `field`).
         *
         * @returns {string} The "## SMART criteria" section, ending with a
         *                   trailing blank line.
         */
        function generate_markdown_smart() {
            return "## SMART criteria\n\n" +
                "### Specific\n\n" + field('specific') + "\n\n" +
                "### Measurable\n\n" + field('measurable') + "\n\n" +
                "### Actionable\n\n" + field('actionable') + "\n\n" +
                "### Relatable\n\n" + field('relatable') + "\n\n" +
                "### Timely\n\n" + field('timely') + "\n\n";
        }

        /**
         * Build the "Key Performance Indicator (KPI)" section.
         *
         * Emits an H2 heading, a key:value metadata block (Title, URL,
         * Contact name, Contact email — one per line so Markdown renders
         * them as a paragraph with hard line breaks), then a blank line,
         * then the KPI content textarea verbatim (after trimming). The
         * content textarea is seeded with guiding questions (Scope, Formula,
         * Units, Frequency, Data source, Comments) which the user fills in.
         *
         * Note: the URL value is emitted as-is so the user controls whether
         * to inline-link it ("<url>") or leave it as plain text — the spec
         * does not constrain that choice.
         *
         * @returns {string} The "## Key Performance Indicator (KPI)" section,
         *                   ending with a trailing blank line.
         */
        function generate_markdown_kpi() {
            return "## Key Performance Indicator (KPI)\n\n" +
                "Title: " + field('kpi-title') + "  \n" +
                "URL: " + field('kpi-url') + "  \n" +
                "Contact name: " + field('kpi-contact-name') + "  \n" +
                "Contact email: " + field('kpi-contact-email') + "\n\n" +
                field('kpi-content') + "\n\n";
        }

        /**
         * Trigger a browser download of `text` as a Markdown file.
         *
         * Uses the standard "blob + object URL + anchor click" technique so
         * no server round-trip is needed (this page has no backend). Steps:
         *   1. Wrap `text` in a Blob with the markdown MIME type and UTF-8
         *      charset so the OS picks the right default app on open.
         *   2. Create an object URL pointing at the Blob.
         *   3. Build a hidden <a download="..."> anchor, attach it to the
         *      DOM (some browsers require this for the click to dispatch),
         *      click it, then remove it.
         *   4. Revoke the object URL to free memory; the download was already
         *      handed to the browser by this point.
         *
         * @param {string} text The Markdown content to download.
         */
        function download_markdown(text) {
            const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'smart-okrs-kpis.md';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        /**
         * Click handler for the "Generate Markdown" button.
         *
         * Builds the Markdown document from the current form values and writes
         * it into the read-only "markdown" output textarea so the user can
         * see (and copy) the result without leaving the page. No download is
         * triggered — that is the "Download Markdown" button's job. Splitting
         * the two actions lets the user preview the output, edit upstream
         * fields, regenerate, and only download once they are satisfied.
         *
         * Wired up via the inline `onclick="window.generate()"` attribute on
         * the button (rather than an Alpine handler) so it works even if
         * Alpine fails to initialize. We must spell out `window.` because the
         * button lives inside a <form>, and inline event-handler scope walks
         * the form's named-elements collection first — any element whose id
         * is "generate" would otherwise shadow this global function. The same
         * rule applies to `download` below.
         */
        function generate() {
            document.getElementById('markdown').value = generate_markdown();
        }

        /**
         * Click handler for the "Download Markdown" button.
         *
         * Builds the Markdown document fresh from the current form values
         * (rather than reading the on-page textarea) so the downloaded file
         * always reflects the user's latest input, even if they edited the
         * form after the last "Generate" click. The textarea is read-only
         * for display, not a source of truth.
         */
        function download() {
            download_markdown(generate_markdown());
        }

    </script>

</main>
